<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Верхняя тёмная панель (информация о пользователе подгружается через JS) -->
<nav class="navbar navbar-dark bg-dark px-3">
    <div class="container-fluid">
        <div class="d-flex align-items-center gap-2">
            <span class="text-light" id="userInfo">
                <span th:text="${#authentication.name}"></span> with roles: <span id="userRoles"></span>
            </span>
        </div>
        <form method="post" action="/logout" class="m-0">
            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container-fluid mt-3">
    <div class="row">
        <!-- Боковое меню -->
        <div class="col-md-2">
            <div class="list-group">
                <a th:href="@{/admin}" class="list-group-item list-group-item-action active">Admin</a>
                <a th:href="@{/user}" class="list-group-item list-group-item-action">User</a>
            </div>
        </div>

        <div class="col-md-10">
            <h2 class="mb-3">All Users</h2>

            <!-- Таблица -->
            <table class="table table-bordered table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Name</th>
                    <th>SurName</th>
                    <th>Department</th>
                    <th>Salary</th>
                    <th>Roles</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="usersTableBody">
                <!-- Сюда JavaScript загрузит пользователей -->
                </tbody>
            </table>

            <!-- Кнопка для открытия модального окна добавления -->
            <button type="button" class="btn btn-primary mt-3" data-bs-toggle="modal" data-bs-target="#userModal" onclick="openAddModal()">
                Add New User
            </button>
        </div>
    </div>
</div>

<!-- Модальное окно для добавления/редактирования пользователя -->
<div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="userModalTitle">Add User</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="userForm">
                    <input type="hidden" id="userId" name="id">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">SurName</label>
                        <input type="text" class="form-control" id="surName" name="surName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Department</label>
                        <input type="text" class="form-control" id="department" name="department">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Salary</label>
                        <input type="number" class="form-control" id="salary" name="salary" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Roles</label>
                        <select multiple class="form-control" id="roles" name="roles">
                            <option value="5">ADMIN</option>
                            <option value="6">USER</option>
                        </select>
                        <small class="text-muted">Hold Ctrl to select multiple roles</small>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveUser()">Save</button>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно подтверждения удаления -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">Delete User</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete this user?</p>
                <p><strong>User:</strong> <span id="deleteUserName"></span></p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Глобальные переменные
    let currentUserId = null;  // ID пользователя для удаления
    let isEditMode = false;    // Режим редактирования

    // Загрузка всех пользователей при загрузке страницы
    document.addEventListener('DOMContentLoaded', function() {
        loadUsers();
        loadCurrentUserInfo();
    });

    // Получение текущего пользователя (для отображения в шапке)
    function loadCurrentUserInfo() {
        fetch('/api/admin/current-user')  // Нужно добавить этот эндпоинт
            .then(response => response.json())
            .then(user => {
                document.getElementById('userInfo').innerHTML =
                    '<strong>' + user.username + '</strong> with roles: ' +
                    user.roles.map(r => r.name.replace('ROLE_', '')).join(', ');
            })
            .catch(error => console.error('Error loading user info:', error));
    }

    // Загрузка всех пользователей из REST API
    function loadUsers() {
        fetch('/api/admin/users')
            .then(response => response.json())
            .then(users => {
                const tbody = document.getElementById('usersTableBody');
                tbody.innerHTML = '';
                users.forEach(user => {
                    const row = `
                        <tr>
                            <td>${user.id}</td>
                            <td>${escapeHtml(user.username)}</td>
                            <td>${escapeHtml(user.name)}</td>
                            <td>${escapeHtml(user.surName)}</td>
                            <td>${escapeHtml(user.department)}</td>
                            <td>${user.salary}</td>
                            <td>${user.roles.map(r => r.name.replace('ROLE_', '')).join(', ')}</td>
                            <td>
                                <button class="btn btn-sm btn-warning" onclick="openEditModal(${user.id})">Edit</button>
                                <button class="btn btn-sm btn-danger" onclick="openDeleteModal(${user.id}, '${escapeHtml(user.username)}')">Delete</button>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            })
            .catch(error => console.error('Error loading users:', error));
    }

    // Открытие модального окна для добавления
    function openAddModal() {
        isEditMode = false;
        document.getElementById('userModalTitle').innerText = 'Add User';
        document.getElementById('userForm').reset();
        document.getElementById('userId').value = '';
        document.getElementById('password').required = true;
        new bootstrap.Modal(document.getElementById('userModal')).show();
    }

    // Открытие модального окна для редактирования
    function openEditModal(id) {
        isEditMode = true;
        document.getElementById('userModalTitle').innerText = 'Edit User';
        document.getElementById('password').required = false;

        fetch(`/api/admin/users/${id}`)
            .then(response => response.json())
            .then(user => {
                document.getElementById('userId').value = user.id;
                document.getElementById('username').value = user.username;
                document.getElementById('name').value = user.name;
                document.getElementById('surName').value = user.surName;
                document.getElementById('department').value = user.department;
                document.getElementById('salary').value = user.salary;

                // Отмечаем выбранные роли
                const roleSelect = document.getElementById('roles');
                const userRoleIds = user.roles.map(r => r.id.toString());
                Array.from(roleSelect.options).forEach(option => {
                    option.selected = userRoleIds.includes(option.value);
                });

                new bootstrap.Modal(document.getElementById('userModal')).show();
            })
            .catch(error => console.error('Error loading user:', error));
    }

    // Сохранение пользователя (добавление или обновление)
    function saveUser() {
        const user = {
            id: document.getElementById('userId').value,
            username: document.getElementById('username').value,
            name: document.getElementById('name').value,
            surName: document.getElementById('surName').value,
            department: document.getElementById('department').value,
            salary: parseInt(document.getElementById('salary').value),
            password: document.getElementById('password').value,
            roles: Array.from(document.getElementById('roles').selectedOptions).map(opt => ({id: parseInt(opt.value)}))
        };

        const url = isEditMode ? `/api/admin/users/${user.id}` : '/api/admin/users';
        const method = isEditMode ? 'PUT' : 'POST';

        fetch(url, {
            method: method,
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(user)
        })
            .then(response => {
                if (response.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('userModal')).hide();
                    loadUsers();  // Перезагружаем таблицу
                } else {
                    alert('Error saving user');
                }
            })
            .catch(error => console.error('Error saving user:', error));
    }

    // Открытие модального окна удаления
    function openDeleteModal(id, username) {
        currentUserId = id;
        document.getElementById('deleteUserName').innerText = username;
        new bootstrap.Modal(document.getElementById('deleteModal')).show();
    }

    // Подтверждение удаления
    function confirmDelete() {
        fetch(`/api/admin/users/${currentUserId}`, {method: 'DELETE'})
            .then(response => {
                if (response.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
                    loadUsers();  // Перезагружаем таблицу
                } else {
                    alert('Error deleting user');
                }
            })
            .catch(error => console.error('Error deleting user:', error));
    }

    // Функция для защиты от XSS (экранирование спецсимволов)
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
</script>

</body>
</html>
